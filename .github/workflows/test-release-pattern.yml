name: TEST — release-branch deploy pattern

# Validates Option 3: build the Wasm preview, then force-push the built static
# output to a `release-test` branch. Netlify (when configured by DevOps) would
# auto-deploy that branch as static files — no build command on Netlify's side.
# Same pattern as Codefied/housecall-ui's release branch.

on:
  push:
    branches: [test-release-pattern]
  workflow_dispatch: {}

permissions:
  contents: write   # Needed to push the release-test branch

jobs:
  build-and-push-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # Persist the runner's GITHUB_TOKEN credential so the later git push works.
          persist-credentials: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/libs.versions.toml', '**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Wasm preview
        run: ./gradlew :preview:wasmJsBrowserDistribution --no-daemon --stacktrace

      - name: Force-push built output to release-test branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BUILD_DIR=preview/build/dist/wasmJs/productionExecutable
          test -f "$BUILD_DIR/index.html"

          # Initialize a fresh git repo INSIDE the build output, with no history,
          # then push that single commit to the release-test branch (force).
          # This way the release-test branch contains ONLY the built files —
          # no source, no .git bloat, no history accumulation.
          cd "$BUILD_DIR"
          git init -q -b release-test
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${{ github.sha }}"
          git push -f \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            HEAD:release-test
          echo "✅ release-test branch updated with built output"
          echo ""
          echo "Files pushed:"
          git ls-tree --name-only -r HEAD | head -10
