name: Deploy preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-progress runs of this workflow when a new commit lands.
concurrency:
  group: deploy-preview
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # The :housecall-ui-android module applies `com.android.library` so the
      # Android SDK must be present at Gradle configuration time, even though
      # we only build the wasmJs target on this runner.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/libs.versions.toml', '**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Wasm preview
        run: ./gradlew :preview:wasmJsBrowserDistribution --no-daemon --stacktrace

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: preview/build/dist/wasmJs/productionExecutable

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
